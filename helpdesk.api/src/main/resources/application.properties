spring.application.name=helpdesk.api

# Running on in-memory H2 for now so the app can run without a live Oracle instance.
# Swap these for real Oracle connection details (see commented block below) once Oracle is set up.
spring.datasource.url=jdbc:h2:mem:helpdesk;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

